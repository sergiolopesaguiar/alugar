<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Sistema - Veículos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div id="loginBox" class="d-flex justify-content-center align-items-center" style="min-height:100vh;">

    <div class="card shadow" style="max-width:400px; width:100%;">

        <div class="card-header bg-primary text-white">

            <h3>Login</h3>

        </div>

        <div class="card-body">

            <div class="mb-3">
                <input id="loginUsuario" type="text" class="form-control" placeholder="Usuário">
            </div>

            <div class="mb-3">
                <input id="loginSenha" type="password" class="form-control" placeholder="Senha">
            </div>

            <button class="btn btn-primary w-100" onclick="login()">
                Entrar
            </button>

        </div>

    </div>

</div>

<div id="dashboard" class="d-none">

    <div class="d-flex flex-column flex-md-row">

    <nav class="navbar navbar-dark bg-dark d-md-none">
        <div class="container-fluid">
            <button class="btn btn-outline-light btn-sm" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
                &#9776; Menu
            </button>
            <span class="navbar-brand mb-0 h6 text-white ms-2">Sistema</span>
        </div>
    </nav>

    <div class="offcanvas-md offcanvas-start bg-dark text-white sidebar" tabindex="-1" id="sidebarMenu">

        <div class="offcanvas-header d-md-none">
            <h5 class="offcanvas-title text-white">Menu</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu"></button>
        </div>

        <div class="offcanvas-body d-md-flex flex-column p-0">

            <div class="sidebar-titulo d-none d-md-flex justify-content-between align-items-center">
                <span>Menu</span>
                <button type="button" class="btn-colapsar-menu" onclick="alternarMenu()" title="Esconder menu">&#9664;</button>
            </div>

            <a class="sidebar-link sidebar-group-toggle d-flex justify-content-between align-items-center" data-bs-toggle="collapse" href="#menuCadastros" role="button" aria-expanded="true" aria-controls="menuCadastros">
                <span>Cadastros</span>
                <span class="menu-caret">&#9662;</span>
            </a>
            <div class="collapse show" id="menuCadastros">
                <a href="index.html" class="sidebar-link sidebar-sublink" data-rotina="clientes">Clientes</a>
                <a href="veiculos.html" class="sidebar-link sidebar-sublink active" data-rotina="veiculos">Veículos</a>
                <a href="motorista.html" class="sidebar-link sidebar-sublink" data-rotina="motorista">Motorista</a>
                <a href="condutor.html" class="sidebar-link sidebar-sublink" data-rotina="condutor">Condutor</a>
                <a href="contratos.html" class="sidebar-link sidebar-sublink" data-rotina="contratos">Contratos</a>
            </div>

            <a href="manutencao.html" class="sidebar-link" data-rotina="manutencao">Manutenção</a>

            <a class="sidebar-link sidebar-group-toggle d-flex justify-content-between align-items-center" data-bs-toggle="collapse" href="#menuRelatorios" role="button" aria-expanded="true" aria-controls="menuRelatorios">
                <span>Relatórios</span>
                <span class="menu-caret">&#9662;</span>
            </a>
            <div class="collapse show" id="menuRelatorios">
                <a href="relatorio-veiculos.html" class="sidebar-link sidebar-sublink" data-rotina="relatorio_veiculos">Veículos</a>
            </div>

            <a class="sidebar-link sidebar-group-toggle d-flex justify-content-between align-items-center" data-bs-toggle="collapse" href="#menuAdministracao" role="button" aria-expanded="true" aria-controls="menuAdministracao">
                <span>Administração</span>
                <span class="menu-caret">&#9662;</span>
            </a>
            <div class="collapse show" id="menuAdministracao">
                <a href="usuarios.html" class="sidebar-link sidebar-sublink">Usuários</a>
                <a href="permissoes.html" class="sidebar-link sidebar-sublink">Permissões</a>
            </div>

        </div>

    </div>

    <button type="button" id="btnExpandirMenu" class="btn btn-dark btn-sm sidebar-expand-btn" onclick="alternarMenu()" title="Mostrar menu">&#9654;</button>

    <div class="flex-grow-1 p-3 p-md-4">

        <div class="card shadow">

            <div class="card-header bg-primary text-white d-flex flex-wrap justify-content-between align-items-center gap-2">

                <h3 class="mb-0 h4">Veículos</h3>

                <button class="btn btn-outline-light btn-sm" onclick="logout()">Sair</button>

            </div>

            <div class="card-body">

                <div class="row g-2 mb-3">

                    <div class="col-12 col-sm-6 col-md-3">
                        <input id="placa" class="form-control" placeholder="Placa">
                    </div>

                    <div class="col-12 col-sm-6 col-md-3">
                        <select id="fabricante" class="form-select">
                            <option value="" selected disabled>Marca</option>
                            <option>FIAT</option>
                            <option>FORD</option>
                            <option>HYUNDAI</option>
                            <option>RENAULT</option>
                            <option>TOYOTA</option>
                            <option>VOLKSWAGEN</option>
                        </select>
                    </div>

                    <div class="col-12 col-sm-6 col-md-3">
                        <input id="modelo" class="form-control" placeholder="Modelo">
                    </div>

                    <div class="col-12 col-sm-6 col-md-2">
                        <input id="cor" class="form-control" placeholder="Cor">
                    </div>

                    <div class="col-12 col-sm-6 col-md-1">
                        <input id="ano" type="number" class="form-control" placeholder="Ano">
                    </div>

                </div>

                <div class="row g-2 mb-3">

                    <div class="col-12 col-sm-6 col-md-3">
                        <input id="chassi" class="form-control" placeholder="Chassi">
                    </div>

                    <div class="col-12 col-sm-6 col-md-3">
                        <input id="renavam" class="form-control" placeholder="Renavam">
                    </div>

                    <div class="col-12 col-sm-6 col-md-2">
                        <input id="km_compra" type="number" class="form-control" placeholder="KM na compra">
                    </div>

                    <div class="col-12 col-sm-6 col-md-2">
                        <input id="valor_compra" type="number" step="0.01" class="form-control" placeholder="Valor da compra">
                    </div>

                    <div class="col-12 col-sm-6 col-md-2">
                        <input id="data_compra" type="date" class="form-control" placeholder="Data da compra">
                    </div>

                </div>

                <div class="row g-2 mb-3">

                    <div class="col-12 col-md-4">
                        <input id="origem_compra" class="form-control" placeholder="Origem da compra">
                    </div>

                    <div class="col-12 col-md-8">
                        <input id="observacao" class="form-control" placeholder="Observação">
                    </div>

                </div>

                <div class="d-flex gap-2 flex-wrap">
                    <button id="btnSalvar" class="btn btn-success botao-salvar" onclick="salvar()">
                        Salvar
                    </button>

                    <button id="btnCancelar" class="btn btn-secondary botao-salvar d-none" onclick="cancelarEdicao()">
                        Cancelar
                    </button>
                </div>

                <hr>

                <div class="table-responsive">

                    <table class="table table-striped mb-0">

                        <thead>

                            <tr>

                                <th>ID</th>
                                <th>Placa</th>
                                <th>Fabricante</th>
                                <th>Modelo</th>
                                <th>Cor</th>
                                <th>Ano</th>
                                <th>Ações</th>

                            </tr>

                        </thead>

                        <tbody id="lista"></tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    </div>

</div>

<script>
// Decide login/dashboard IMEDIATAMENTE, sem esperar os scripts externos
// (Supabase/Bootstrap) carregarem da CDN - evita o "flash" do formulário
// de login ao trocar de aba/página. Ver index.html para o comentário completo.
(function(){
    var logado = localStorage.getItem('logado') === 'sim';
    document.getElementById('loginBox').classList.toggle('d-none', logado);
    document.getElementById('dashboard').classList.toggle('d-none', !logado);

    var colapsado = localStorage.getItem('menuColapsado') === 'sim';
    var sidebar = document.getElementById('sidebarMenu');
    var btnExpandir = document.getElementById('btnExpandirMenu');
    if(sidebar){ sidebar.classList.toggle('colapsado', colapsado); }
    if(btnExpandir){ btnExpandir.classList.toggle('mostrar', colapsado); }
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="auth.js"></script>

<script src="veiculos.js"></script>

</body>

</html>
