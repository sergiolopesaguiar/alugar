<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Sistema - Motorista</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div id="loginBox" class="d-flex justify-content-center align-items-center" style="min-height:100vh;">

    <div class="card shadow" style="max-width:400px; width:100%;">

        <div class="card-header bg-primary text-white">

            <h3>Login</h3>

        </div>

        <div class="card-body">

            <div class="mb-3">
                <input id="loginUsuario" type="text" class="form-control" placeholder="Usuário">
            </div>

            <div class="mb-3">
                <input id="loginSenha" type="password" class="form-control" placeholder="Senha">
            </div>

            <button class="btn btn-primary w-100" onclick="login()">
                Entrar
            </button>

        </div>

    </div>

</div>

<div id="dashboard" class="d-none">

    <div class="d-flex flex-column flex-md-row">

    <nav class="navbar navbar-dark bg-dark d-md-none">
        <div class="container-fluid">
            <button class="btn btn-outline-light btn-sm" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
                &#9776; Menu
            </button>
            <span class="navbar-brand mb-0 h6 text-white ms-2">Sistema</span>
        </div>
    </nav>

    <div class="offcanvas-md offcanvas-start bg-dark text-white sidebar" tabindex="-1" id="sidebarMenu">

        <div class="offcanvas-header d-md-none">
            <h5 class="offcanvas-title text-white">Menu</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu"></button>
        </div>

        <div class="offcanvas-body d-md-flex flex-column p-0">

            <div class="sidebar-titulo d-none d-md-block">Menu</div>

            <a href="index.html" class="sidebar-link">Clientes</a>
            <a href="veiculos.html" class="sidebar-link">Veículos</a>
            <a href="motorista.html" class="sidebar-link active">Motorista</a>
            <a href="manutencao.html" class="sidebar-link">Manutenção</a>

        </div>

    </div>

    <div class="flex-grow-1 p-3 p-md-4">

        <div class="card shadow">

            <div class="card-header bg-primary text-white d-flex flex-wrap justify-content-between align-items-center gap-2">

                <h3 class="mb-0 h4">Veículos &gt; Motorista</h3>

                <button class="btn btn-outline-light btn-sm" onclick="logout()">Sair</button>

            </div>

            <div class="card-body">

                <div class="row g-2 mb-2">

                    <div class="col-12 col-sm-6 col-md-3">
                        <select id="veiculoId" class="form-select">
                            <option value="" selected disabled>Veículo</option>
                        </select>
                    </div>

                    <div class="col-12 col-sm-6 col-md-3">
                        <input id="nomeMotorista" class="form-control" placeholder="Nome do motorista">
                    </div>

                    <div class="col-12 col-sm-6 col-md-2">
                        <input id="telefone" class="form-control" placeholder="(00) 00000-0000" maxlength="15">
                    </div>

                    <div class="col-12 col-sm-6 col-md-2">
                        <input id="cnh" class="form-control" placeholder="CNH">
                    </div>

                    <div class="col-12 col-sm-6 col-md-2">
                        <input id="vencimentoCnh" type="date" class="form-control" placeholder="Vencimento CNH" title="Vencimento da CNH do Motorista">
                    </div>

                </div>

                <div class="row g-2 mb-3">

                    <div class="col-12 col-sm-6 col-md-4">
                        <input id="regiaoMotorista" class="form-control" placeholder="Região do motorista">
                    </div>

                    <div class="col-12 col-md-8">
                        <textarea id="observacao" class="form-control" placeholder="Observação" rows="1"></textarea>
                    </div>

                </div>

                <div class="d-flex gap-2 flex-wrap">
                    <button id="btnSalvar" class="btn btn-success botao-salvar" onclick="salvar()">
                        Salvar
                    </button>

                    <button id="btnCancelar" class="btn btn-secondary botao-salvar d-none" onclick="cancelarEdicao()">
                        Cancelar
                    </button>
                </div>

                <hr>

                <div class="table-responsive">

                    <table class="table table-striped mb-0">

                        <thead>

                            <tr>

                                <th>ID</th>
                                <th>Veículo</th>
                                <th>Motorista</th>
                                <th>Telefone</th>
                                <th>CNH</th>
                                <th title="Vencimento da CNH do Motorista">Vencimento CNH</th>
                                <th>Região</th>
                                <th>Observação</th>
                                <th>Ações</th>

                            </tr>

                        </thead>

                        <tbody id="lista"></tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="auth.js"></script>

<script src="motorista.js"></script>

</body>

</html>
